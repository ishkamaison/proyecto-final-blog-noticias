<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Publicar Noticia - Chile Noticias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">← Volver al Inicio</a>
    </div>
</nav>

<div class="container" style="max-width: 700px;">
    <div class="card shadow-sm p-4 border-0">
        <h2 class="mb-4 fw-bold">Nueva Noticia</h2>
        <form id="formNoticia">
            <div class="mb-3">
                <label class="form-label">Título de la noticia</label>
                <input type="text" id="titulo" class="form-control" maxlength="60" placeholder="Ej: Gran descubrimiento en el desierto..." required>
            </div>
            <div class="mb-3">
                <label class="form-label">Categoría</label>
                <select id="categoria" class="form-select" required>
                    <option value="Turismo">Turismo</option>
                    <option value="Tecnología">Tecnología</option>
                    <option value="Cultura">Cultura</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">URL de la Imagen</label>
                <input type="url" id="imagen_url" class="form-control" placeholder="https://ejemplo.com/foto.jpg" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Contenido</label>
                <textarea id="contenido" class="form-control" rows="8" maxlength="4000" placeholder="Escribe el cuerpo de la noticia aquí..." required></textarea>
            </div>
            <button type="submit" class="btn btn-success w-100 fw-bold">Publicar Noticia</button>
        </form>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');

    if (!token) {
        alert("Debes iniciar sesión para publicar noticias.");
        window.location.href = '/login.html';
    }

    document.getElementById('formNoticia').addEventListener('submit', async (e) => {
        e.preventDefault();

        const nuevaNoticia = {
            titulo: document.getElementById('titulo').value,
            categoria: document.getElementById('categoria').value,
            imagen_url: document.getElementById('imagen_url').value,
            contenido: document.getElementById('contenido').value
        };

        try {
            const res = await fetch('/api/v1/noticias', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(nuevaNoticia)
            });

            const result = await res.json();

            if (result.ok) {
                alert("¡Noticia publicada con éxito!");
                window.location.href = '/';
            } else {
                alert("Error: " + result.msg);
            }
        } catch (error) {
            console.error("Error al publicar:", error);
        }
    });
</script>
</body>
</html>
