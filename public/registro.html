<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Cuenta - Chile Noticias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f1f3f5; }
        .registro-container { max-width: 450px; margin-top: 80px; }
    </style>
</head>
<body>

<div class="container registro-container">
    <div class="card shadow-lg border-0 p-4 rounded-4">
        <h2 class="text-center mb-4 fw-bold text-primary">Únete al Blog</h2>
        <p class="text-center text-muted">Crea tu cuenta para comentar y participar en la comunidad.</p>
        
        <form id="registroForm">
            <div class="mb-3">
                <label class="form-label">Nombre Completo</label>
                <input type="text" id="nombre" class="form-control" placeholder="Ej: Ishka González" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Correo Electrónico</label>
                <input type="email" id="email" class="form-control" placeholder="nombre@correo.cl" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" id="password" class="form-control" placeholder="Mínimo 6 caracteres" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Registrarme</button>
        </form>
        
        <div class="mt-4 text-center">
            <p class="small text-muted">¿Ya tienes cuenta? <a href="/login.html" class="text-decoration-none">Inicia sesión aquí</a></p>
            <a href="/" class="text-decoration-none small text-secondary">← Volver al inicio</a>
        </div>
    </div>
</div>

<script>
    const registroForm = document.getElementById('registroForm');

    registroForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const nombre = document.getElementById('nombre').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const res = await fetch('/api/v1/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre, email, password })
            });

            const result = await res.json();

            if (result.ok) {
                alert("¡Registro exitoso! Ahora puedes iniciar sesión.");
                window.location.href = '/login.html'; // Redirigir al login
            } else {
                alert(result.msg || "Error al registrar el usuario");
            }

        } catch (error) {
            console.error("Error:", error);
            alert("Error de conexión con el servidor.");
        }
    });
</script>
</body>
</html>
