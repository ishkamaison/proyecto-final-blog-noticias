<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ingresar - Chile Noticias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .login-container { max-width: 400px; margin-top: 100px; }
    </style>
</head>
<body>

<div class="container login-container">
    <div class="card shadow border-0 p-4">
        <h2 class="text-center mb-4 fw-bold">Iniciar Sesión</h2>
        <p class="text-muted text-center small">Ingresa tus credenciales para comentar en las noticias.</p>
        
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Correo Electrónico</label>
                <input type="email" id="email" class="form-control" placeholder="ejemplo@correo.cl" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">Entrar al Blog</button>
        </form>
        <div class="mt-3 text-center">
    <p class="small text-muted">¿Aún no tienes cuenta? 
        <a href="/registro.html" class="fw-bold text-decoration-none">Regístrate aquí</a>
    </p>
</div>
        
        <div class="mt-3 text-center">
            <a href="/" class="text-decoration-none small text-secondary">← Volver al inicio</a>
        </div>
    </div>
</div>

<script>
    const loginForm = document.getElementById('loginForm');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const res = await fetch('/api/v1/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const result = await res.json();

            if (result.ok) {
                localStorage.setItem('token', result.token);
                localStorage.setItem('usuario', result.usuario.nombre);

                alert(`¡Bienvenido de nuevo, ${result.usuario.nombre}!`);
                window.location.href = '/'; 
            } else {
                alert(result.msg || "Error en las credenciales");
            }

        } catch (error) {
            console.error("Error en el login:", error);
            alert("Hubo un problema al conectar con el servidor.");
        }
    });
</script>
</body>
</html>
